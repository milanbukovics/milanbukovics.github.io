---
layout: home
---

{% if page.image %}
<div class="tf-project-banner" style="background-image: url('{{ site.baseurl }}/{{ page.image }}')"></div>
{% endif %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <a href="{{ site.baseurl }}/projects/" class="tf-back-link">← Back to Projects</a>

      <h1 class="fw-bold mb-2" style="color:#0f172a;">{{ page.title }}</h1>
      <p style="color:#64748b; font-size:0.85rem; margin-bottom:1rem;">{{ page.date }}</p>

      {% if page.labels %}
      <p class="mb-4">
        {% for label in page.labels %}
        <span class="tf-badge me-1 mb-1">{{ label }}</span>
        {% endfor %}
      </p>
      {% endif %}

      <hr style="border-color:rgba(0,0,0,0.08); margin-bottom:2rem;">

      <div class="tf-project-content">
        {{ content }}
      </div>

    </div>
  </div>
</div>
